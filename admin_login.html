<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>body { font-family: Arial, sans-serif; padding: 20px; }</style>
</head>
<body>
    <h2>অ্যাডমিন লগিন</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<p style="color:red;">{{ messages[0] }}</p>{% endif %}
    {% endwith %}
    <form method="POST">
        <input type="text" name="username" placeholder="ইউজারনেম" required><br><br>
        <input type="password" name="password" placeholder="পাসওয়ার্ড" required><br><br>
        <button type="submit">লগিন</button>
    </form>
    <br><a href="/">শিক্ষার্থী লগিন-এ ফিরে যান</a>
</body>
</html>

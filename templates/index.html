<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>User Login</title>
    <style>body { font-family: Arial, sans-serif; padding: 20px; }</style>
</head>
<body>
    <h2>শিক্ষার্থী লগিন</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="আপনার নাম" required><br><br>
        <input type="email" name="email" placeholder="আপনার জিমেইল" required><br><br>
        <input type="text" name="phone" placeholder="ফোন নম্বর" required><br><br>
        <button type="submit">লগিন করুন</button>
    </form>
    <br><a href="/admin">অ্যাডমিন হিসেবে লগিন করুন</a>
</body>
</html>

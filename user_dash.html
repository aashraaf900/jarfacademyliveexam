<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 20px; max-width: 400px; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>স্বাগতম, {{ name }}!</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<p style="color:red; font-weight:bold;">{{ messages[0] }}</p>{% endif %}
    {% endwith %}
    
    <div class="box">
        <h3>আপনার পরীক্ষার সেটিংস নির্বাচন করুন:</h3>
        <form action="/exam" method="POST">
            <label>প্রশ্নের সংখ্যা:</label><br>
            <select name="q_count" style="width: 100%; padding: 8px; margin-top: 5px;">
                <option value="2">২ টি প্রশ্ন (ডেমো)</option>
                <option value="5">৫ টি প্রশ্ন</option>
                <option value="10">১০ টি প্রশ্ন</option>
                <option value="20">২০ টি প্রশ্ন</option>
            </select><br><br>
            
            <label>সময় (মিনিট):</label><br>
            <select name="time_limit" style="width: 100%; padding: 8px; margin-top: 5px;">
                <option value="1">১ মিনিট</option>
                <option value="5">৫ মিনিট</option>
                <option value="10">১০ মিনিট</option>
            </select><br><br>
            
            <button type="submit" style="background: green; color: white; padding: 10px; width: 100%; border: none; cursor: pointer;">পরীক্ষা শুরু করুন</button>
        </form>
    </div>
    <br>
    <a href="/logout" style="color: red;">লগআউট করুন</a>
</body>
</html>
